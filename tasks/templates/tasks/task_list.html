{% extends 'base.html' %}
{% block content %}
<div class="container-fluid">
    <h4 class="page-title">Task Table</h4>
    <div class="row">
        <div class="col-md-12">
            <div class="card">
                <div class="card-header">
                    <div class="card-title">All Tasks</div>
                </div>
                <div class="card-body">
                    <table class="table table-head-bg-primary mt-4">
                        <thead>
                            <tr>
                                <th scope="col">#</th>
                                <th scope="col">Task Name</th>
                                <th scope="col">Priority</th>
                                <th scope="col">Status</th>
                                <th scope="col">Actions</th>
                            </tr>
                        </thead>
                        <tbody>
                            {% for task in tasks %}
                            <tr>
                                <td>{{ forloop.counter }}</td>
                                <td class="font-weight-bold">{{ task.title }}</td>
                                <td>
                                    <span class="badge badge-pill 
                                        {% if task.priority.name|lower == 'critical' or task.priority.name|lower == 'high' %}badge-danger
                                        {% elif task.priority.name|lower == 'medium' %}badge-warning
                                        {% elif task.priority.name|lower == 'optional' %}badge-success
                                        {% else %}badge-info{% endif %}">
                                        {{ task.priority.name }}
                                    </span>
                                </td>
                                <td>
                                    <span class="badge badge-pill 
                                        {% if task.status|lower == 'completed' %}badge-success
                                        {% elif task.status|lower == 'pending' %}badge-warning
                                        {% elif task.status|lower == 'in progress' or task.status|lower == 'in_progress' %}badge-primary
                                        {% else %}badge-secondary{% endif %}"
                                        style="color: white !important;">
                                        {{ task.status|upper }}
                                    </span>
                                </td>
                                <td>
                                    <div class="form-button-action">
                                        <a href="{% url 'edit_task' task.id %}" class="btn btn-link btn-primary p-1" title="Edit Task">
                                            <i class="la la-edit" style="font-size: 1.5rem;"></i>
                                        </a>
                                        
                                        <a href="{% url 'delete_task' task.id %}" class="btn btn-link btn-danger p-1" 
                                           onclick="return confirm('Delete permanently?')" title="Delete Task">
                                            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="feather feather-trash-2 text-danger">
                                                <polyline points="3 6 5 6 21 6"></polyline>
                                                <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path>
                                                <line x1="10" y1="11" x2="10" y2="17"></line>
                                                <line x1="14" y1="11" x2="14" y2="17"></line>
                                            </svg>
                                        </a>
                                    </div>
                                </td>
                            </tr>
                            {% empty %}
                            <tr>
                                <td colspan="5" class="text-center">No tasks found.</td>
                            </tr>
                            {% endfor %}
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>

<style>
    .badge-success { background-color: #28a745 !important; }
    .badge-warning { background-color: #ffad46 !important; }
    .badge-primary { background-color: #1d7af3 !important; }
    .badge-danger { background-color: #f3545d !important; }
    tr:hover { background-color: rgba(0,0,0,0.02); }
</style>
{% endblock %}
