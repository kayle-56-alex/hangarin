{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Hangarin</title>
    <link rel="stylesheet" href="{% static 'css/bootstrap.min.css' %}">
    <style>
        body { background-color: #f0f2f5; font-family: Helvetica, Arial, sans-serif; }
        .login-container { margin-top: 100px; }
        .fb-logo { color: #1877f2; font-size: 4rem; font-weight: bold; margin-bottom: 0; text-transform: lowercase; }
        .fb-text { font-size: 26px; line-height: 32px; max-width: 500px; }
        .login-card { background: #fff; padding: 20px; border-radius: 8px; box-shadow: 0 2px 4px rgba(0,0,0,.1), 0 8px 16px rgba(0,0,0,.1); }
        .btn-login { background-color: #1877f2; border: none; font-size: 20px; font-weight: bold; padding: 10px; color: white; }
        .btn-login:hover { background-color: #166fe5; color: white; }
        .forgot-password { color: #1877f2; font-size: 14px; text-decoration: none; }
        .divider { border-bottom: 1px solid #dadde1; margin: 20px 0; }
        .btn-create { background-color: #42b72a; border: none; font-weight: bold; padding: 10px 20px; color: white; text-decoration: none; display: inline-block; border-radius: 6px; }
        .btn-create:hover { background-color: #36a420; color: white; }
    </style>
</head>
<body>
    <div class="container login-container">
        <div class="row align-items-center">
            <div class="col-lg-7 d-none d-lg-block">
                <h1 class="fb-logo">hangarin</h1>
                <p class="fb-text">Hangarin helps you organize your tasks and reach your goals with the people in your life.</p>
            </div>
            
            <div class="col-lg-5 col-md-8 mx-auto">
                <div class="login-card">
                    {% if form.errors %}
                        <div class="alert alert-danger p-2 small text-center">
                            Invalid username or password.
                        </div>
                    {% endif %}

                    <form method="post" action="{% url 'login' %}">
                        {% csrf_token %}
                        <div class="form-group mb-3">
                            <input type="text" name="username" class="form-control form-control-lg" placeholder="Username" required>
                        </div>
                        <div class="form-group mb-3">
                            <input type="password" name="password" class="form-control form-control-lg" placeholder="Password" required>
                        </div>
                        <button type="submit" class="btn btn-login btn-lg w-100">Log In</button>
                        
                        <div class="text-center mt-3">
                            <a href="#" class="forgot-password">Forgotten password?</a>
                        </div>
                        <div class="divider"></div>
                        <div class="text-center">
                            <a href="{% url 'admin:index' %}" class="btn btn-create btn-lg">Go to Admin Panel</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
