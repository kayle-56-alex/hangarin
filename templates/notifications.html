{% extends 'base.html' %}
{% block content %}
<div class="container-fluid">
    <h4 class="page-title">Notifications</h4>
    <div class="row">
        <div class="col-md-10 mx-auto">
            <div class="card">
                <div class="card-header"><h4 class="card-title">Priority Task List</h4></div>
                <div class="card-body">
                    {% for task in pending_tasks %}
                    <div class="d-flex align-items-center p-3 mb-3 bg-white border rounded shadow-sm">
                        <div style="width: 6px; height: 45px; border-radius: 10px;" 
                             class="mr-3 
                             {% if task.priority.name|lower == 'critical' %}bg-danger
                             {% elif task.priority.name|lower == 'high' %}bg-danger
                             {% elif task.priority.name|lower == 'medium' %}bg-warning
                             {% elif task.priority.name|lower == 'low' %}bg-info
                             {% else %}bg-secondary{% endif %}">
                        </div>
                        
                        <div class="flex-grow-1">
                            <h6 class="mb-1 font-weight-bold">{{ task.title }}</h6>
                            <span class="badge badge-pill border text-muted small uppercase">{{ task.priority.name }}</span>
                            <span class="ml-3 small text-muted"><i class="la la-calendar"></i> Deadline: {{ task.deadline|date:"M d"|default:"TBD" }}</span>
                        </div>
                        <a href="{% url 'edit_task' task.id %}" class="btn btn-outline-primary btn-sm">View Task</a>
                    </div>
                    {% empty %}
                    <p class="text-center py-5 text-muted">No pending tasks to show.</p>
                    {% endfor %}
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
